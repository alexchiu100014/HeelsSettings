name: Build and release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build KK and KKS packages
    runs-on: [self-hosted, windows, x64, heels-build]
    env:
      REFERENCE_ROOT: ${{ vars.REFERENCE_ROOT }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate runner configuration
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REFERENCE_ROOT)) {
            throw "Repository variable REFERENCE_ROOT is not configured."
          }
          if (-not (Test-Path -LiteralPath $env:REFERENCE_ROOT -PathType Container)) {
            throw "REFERENCE_ROOT does not exist on this runner: $env:REFERENCE_ROOT"
          }
          dotnet --info

      - name: Build and package
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") {
            $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            "ci-$env:GITHUB_RUN_NUMBER"
          }
          .\scripts\Build-Release.ps1 -ReferenceRoot $env:REFERENCE_ROOT -Version $version

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          path: artifacts/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: packages

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(Get-ChildItem packages -Recurse -Filter *.zip -File)
          if ($assets.Count -eq 0) {
            throw "No release packages were downloaded."
          }
          $arguments = @(
            "release", "create", $env:GITHUB_REF_NAME,
            "--verify-tag", "--generate-notes", "--title", $env:GITHUB_REF_NAME
          )
          $arguments += $assets.FullName
          & gh @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release creation failed."
          }
